      <stop offset="0%" stop-color="#12110F"/>
      <stop offset="60%" stop-color="#1a1814"/>
      <stop offset="100%" stop-color="#141210"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="60%">
